<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroReady MBA — Diamond Economics Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --navy-2: #1a2e42;
  --navy-3: #243d54;
  --gold: #c9a84c;
  --gold-light: #f0d485;
  --gold-dim: #7a6330;
  --cream: #faf6ef;
  --cream-2: #f0e8d8;
  --cream-3: #e4d5be;
  --jade: #2d6a4f;
  --jade-light: #95d5b2;
  --rose: #8b2635;
  --rose-light: #f4a0a8;
  --slate: #4a5568;
  --slate-light: #cbd5e0;
  --white: #ffffff;
  --text: #0d1b2a;
  --text-muted: #5a6a7a;
  --text-dim: #8a9aaa;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 2px 12px rgba(13,27,42,0.10);
  --shadow-lg: 0 8px 32px rgba(13,27,42,0.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.65;
}

/* ── HEADER ── */
.site-header {
  background: var(--navy);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 2px solid var(--gold);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}
.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.logo-main {
  font-family: 'DM Serif Display', serif;
  color: var(--gold);
  font-size: 22px;
  letter-spacing: -0.02em;
}
.logo-sub {
  color: var(--slate-light);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--slate-light);
  font-size: 12px;
}
.progress-pill {
  background: var(--navy-2);
  border: 1px solid var(--navy-3);
  border-radius: 20px;
  padding: 4px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--gold);
}

/* ── LAYOUT ── */
.layout {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 2rem;
  align-items: start;
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky;
  top: 80px;
}
.sidebar-section { margin-bottom: 1.5rem; }
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
  padding-left: 2px;
}
.ch-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 14px;
  border: none;
  border-radius: var(--radius);
  background: transparent;
  cursor: pointer;
  text-align: left;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-muted);
  transition: all 0.15s;
  margin-bottom: 3px;
}
.ch-btn:hover { background: var(--cream-2); color: var(--text); }
.ch-btn.active {
  background: var(--navy);
  color: var(--gold);
  font-weight: 500;
}
.ch-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ch-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  opacity: 0.6;
}

.q-list { list-style: none; }
.q-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  transition: all 0.15s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.q-item:hover { background: var(--cream-2); color: var(--text); }
.q-item.active {
  background: var(--cream-2);
  border-color: var(--cream-3);
  color: var(--text);
  font-weight: 500;
}
.q-item.done { color: var(--jade); }
.q-check {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--slate-light);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}
.q-item.done .q-check {
  background: var(--jade);
  border-color: var(--jade);
  color: white;
}

/* ── MAIN CONTENT ── */
.main { min-width: 0; }

/* ── QUESTION CARD ── */
.q-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 1.5rem;
  border: 1px solid var(--cream-3);
}
.q-card-header {
  background: var(--navy);
  padding: 1.5rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.q-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
}
.badge-num { background: var(--gold-dim); color: var(--gold-light); }
.badge-diff-b { background: rgba(45,106,79,0.3); color: var(--jade-light); }
.badge-diff-i { background: rgba(139,38,53,0.3); color: var(--rose-light); }
.badge-topic { background: var(--navy-2); color: var(--slate-light); }
.q-card-title {
  font-family: 'DM Serif Display', serif;
  color: var(--white);
  font-size: 20px;
  line-height: 1.3;
}
.q-card-body { padding: 1.5rem 2rem; }

/* ── SCENARIO ── */
.scenario-box {
  background: var(--cream);
  border-left: 3px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
}
.scenario-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 6px;
}

/* ── CONTEXT TABS ── */
.context-section { margin-bottom: 1.5rem; }
.context-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--cream-3);
  padding-bottom: 0;
}
.ctx-tab {
  padding: 7px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  font-weight: 400;
}
.ctx-tab:hover { color: var(--text-muted); }
.ctx-tab.active {
  color: var(--navy);
  border-bottom-color: var(--gold);
  font-weight: 500;
}
.ctx-content {
  background: var(--cream);
  border-radius: 0 var(--radius) var(--radius) var(--radius);
  padding: 1rem 1.25rem;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  border: 1px solid var(--cream-3);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
}
.ctx-who { border-left: 3px solid var(--gold); }
.ctx-why { border-left: 3px solid var(--jade); }
.ctx-what { border-left: 3px solid #5b7fa6; }
.ctx-when { border-left: 3px solid var(--rose); }
.ctx-how { border-left: 3px solid #6b5fa6; }

/* ── PARTS NAV ── */
.parts-nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.part-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--cream-3);
  background: var(--white);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text-muted);
  transition: all 0.15s;
}
.part-btn:hover { border-color: var(--slate-light); color: var(--text); }
.part-btn.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--gold);
  font-weight: 500;
}
.part-btn.done { border-color: var(--jade); color: var(--jade); background: rgba(45,106,79,0.06); }

/* ── FORMULA BOX ── */
.formula-box {
  background: var(--navy);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.formula-lbl {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 6px;
}
.formula-expr {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  color: var(--gold-light);
  line-height: 1.5;
  white-space: pre-wrap;
}

/* ── CALC STEPS ── */
.calc-area {
  background: var(--cream);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  border: 1px solid var(--cream-3);
}
.calc-step-row {
  display: grid;
  grid-template-columns: 180px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--cream-3);
  animation: fadeUp 0.25s ease;
}
.calc-step-row:last-child { border-bottom: none; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.step-lbl {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}
.step-math {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--slate);
}
.step-result {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--navy);
  font-weight: 500;
  text-align: right;
  white-space: nowrap;
}

/* ── ANSWER BOX ── */
.answer-box {
  background: linear-gradient(135deg, rgba(45,106,79,0.08) 0%, rgba(45,106,79,0.04) 100%);
  border: 1.5px solid rgba(45,106,79,0.3);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  animation: fadeUp 0.25s ease;
}
.answer-lbl {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--jade);
  margin-bottom: 6px;
}
.answer-val {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  color: var(--jade);
  font-weight: 500;
  margin-bottom: 8px;
}
.answer-interp {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 20px;
  border-radius: var(--radius);
  border: 1.5px solid;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
}
.btn-ghost {
  background: transparent;
  border-color: var(--cream-3);
  color: var(--text-muted);
}
.btn-ghost:hover { border-color: var(--slate-light); color: var(--text); background: var(--cream); }
.btn-primary {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--gold);
}
.btn-primary:hover { background: var(--navy-2); }
.btn-jade {
  background: var(--jade);
  border-color: var(--jade);
  color: white;
}
.btn-jade:hover { background: #245c43; }
.btn-ask {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
}
.btn-ask:hover { background: var(--gold-light); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.75rem; }

/* ── CONGRATS ── */
.congrats-box {
  background: var(--navy);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  text-align: center;
  margin-top: 1rem;
  animation: fadeUp 0.3s ease;
}
.congrats-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--gold);
  margin-bottom: 6px;
}
.congrats-sub {
  font-size: 13px;
  color: var(--slate-light);
  margin-bottom: 1rem;
  line-height: 1.6;
}

/* ── PART QUESTION ── */
.part-q-text {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 1rem;
  line-height: 1.6;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--cream-3);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  text-align: center;
}
.stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  color: var(--navy);
}
.stat-lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── REVEAL HINT ── */
.reveal-hint {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  padding: 8px 0;
}

/* ── FOOTER ── */
.site-footer {
  background: var(--navy);
  color: var(--slate-light);
  text-align: center;
  padding: 1.5rem;
  font-size: 12px;
  margin-top: 3rem;
  border-top: 2px solid var(--gold-dim);
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .calc-step-row { grid-template-columns: 1fr; }
  .step-result { text-align: left; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-main">MicroReady MBA</span>
      <span class="logo-sub">Diamond Economics Tutor</span>
    </div>
    <div class="header-progress">
      <span>Progress:</span>
      <span class="progress-pill" id="progress-pill">0 / 15 parts</span>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Chapters</div>
      <button class="ch-btn active" data-ch="1" onclick="switchChapter(1)">
        <span class="ch-dot" style="background:#378ADD"></span>
        <span class="ch-num">Ch 1</span>
        Elasticity
      </button>
      <button class="ch-btn" data-ch="2" onclick="switchChapter(2)">
        <span class="ch-dot" style="background:#2d6a4f"></span>
        <span class="ch-num">Ch 2</span>
        Externalities
      </button>
      <button class="ch-btn" data-ch="3" onclick="switchChapter(3)">
        <span class="ch-dot" style="background:#c9a84c"></span>
        <span class="ch-num">Ch 3</span>
        Public Goods
      </button>
      <button class="ch-btn" data-ch="4" onclick="switchChapter(4)">
        <span class="ch-dot" style="background:#8b2635"></span>
        <span class="ch-num">Ch 4</span>
        Info Asymmetry
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Questions</div>
      <ul class="q-list" id="q-list"></ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Chapter Overview</div>
      <div id="ch-summary" style="font-size:12px;color:var(--text-muted);line-height:1.6;padding:4px 2px;"></div>
    </div>
  </aside>

  <main class="main">
    <div class="stats-row" id="stats-row"></div>
    <div id="q-content"></div>
  </main>
</div>

<footer class="site-footer">
  FIN 515 · Prof. Melissa M. Appleyard · Portland State University · MicroReady MBA — Diamond Jewelry & SCS-007 Certification Primer
</footer>

<script>
const CHAPTERS = [
  {
    id: 1,
    name: "The Language of Demand",
    subtitle: "Elasticities",
    color: "#378ADD",
    summary: "How sensitive are buyers to price changes? This chapter gives you the math to measure it — three types of elasticity that every pricing decision depends on.",
  },
  {
    id: 2,
    name: "When Markets Get Prices Wrong",
    subtitle: "Externalities & Pigou",
    color: "#2d6a4f",
    summary: "What happens when a firm's private costs don't capture the full damage it causes? Markets overproduce — and Pigouvian taxes are the fix. SCS-007 is this logic in action.",
  },
  {
    id: 3,
    name: "The Collective Action Problem",
    subtitle: "Public Goods & Free-Riding",
    color: "#c9a84c",
    summary: "Why don't sustainability standards emerge on their own? Because every firm wants to free-ride. This chapter shows the math of why — and how institutions like SCS-007 solve it.",
  },
  {
    id: 4,
    name: "The Market for Lemons",
    subtitle: "Information Asymmetry",
    color: "#8b2635",
    summary: "When sellers know more than buyers about product quality, markets unravel. Akerlof's 1970 Nobel-winning insight explains why greenwashing kills the market for genuine sustainable diamonds.",
  },
];

const QUESTIONS = [
  // ── CHAPTER 1 ──────────────────────────────────────────────────────────
  {
    ch: 1, id: "p1", num: "Problem 1", diff: "beginner",
    topic: "Own-Price Elasticity",
    title: "Signet Jewelers cuts price on lab-grown rings",
    scenario: "Signet Jewelers sells lab-grown diamond solitaire engagement rings. In January 2025 the average price was <strong>$1,200</strong> and Signet sold <strong>500 rings/month</strong>. After dropping the price to <strong>$1,000</strong> in February, monthly sales jumped to <strong>600 rings</strong>.",
    context: {
      what: "Own-price elasticity of demand — it measures how sensitive buyers are to a change in THIS product's own price. Think of it like a rubber band: some goods stretch a lot when price moves (elastic), others barely budge (inelastic).",
      why: "Signet needs to answer: if we drop prices, will we sell ENOUGH extra rings to make up for the revenue we lose per ring? Elasticity is the tool that answers that question precisely — instead of just guessing.",
      who: "Alfred Marshall at Cambridge formalized this in his 1890 <em>Principles of Economics</em>. Antoine Cournot (1838) laid the groundwork. Baye & Prince teach it in Chapter 3.",
      when: "Any time a company is deciding whether to raise or lower prices. Elastic demand → cut prices to grow revenue. Inelastic demand → raise prices to grow revenue. Getting this wrong is expensive.",
      how: "Step 1: Calculate % change in quantity using the midpoint formula. Step 2: Calculate % change in price using midpoint formula. Step 3: Divide. Step 4: Compare the absolute value to 1."
    },
    parts: [
      {
        label: "Part a",
        q: "Calculate the own-price elasticity of demand using the arc (midpoint) formula.",
        formula: { label: "Arc (Midpoint) Formula — use this, not the endpoint formula", expr: "E_d  =  [(Q₂−Q₁) / ((Q₂+Q₁)/2)]  ÷  [(P₂−P₁) / ((P₂+P₁)/2)]" },
        steps: [
          { lbl: "Average Q", math: "(600 + 500) / 2", res: "= 550" },
          { lbl: "% change in Q", math: "(600 − 500) / 550", res: "= 0.1818  →  18.18%" },
          { lbl: "Average P", math: "(1,000 + 1,200) / 2", res: "= 1,100" },
          { lbl: "% change in P", math: "(1,000 − 1,200) / 1,100", res: "= −0.1818  →  −18.18%" },
          { lbl: "Elasticity E_d", math: "18.18% ÷ (−18.18%)", res: "= −1.0" },
        ],
        answer: "E_d = −1.0",
        interp: "The midpoint formula gives the same answer in both directions — that's why we use it. Here, quantity rose 18.18% and price fell 18.18%: perfectly balanced."
      },
      {
        label: "Part b",
        q: "Is demand elastic, inelastic, or unit elastic? Explain what this means.",
        formula: { label: "Classification rule", expr: "|E_d| > 1  →  elastic\n|E_d| < 1  →  inelastic\n|E_d| = 1  →  unit elastic" },
        steps: [
          { lbl: "Our |E_d|", math: "|−1.0|", res: "= 1.0" },
          { lbl: "Compare to 1", math: "1.0  =  1", res: "→  exactly unit elastic" },
        ],
        answer: "Unit elastic  (|E_d| = 1.0)",
        interp: "The percentage drop in price was exactly matched by the percentage rise in quantity sold. It's a perfect seesaw — perfectly balanced."
      },
      {
        label: "Part c",
        q: "Did Signet's total revenue increase or decrease from the price cut? Show the calculation.",
        formula: { label: "Total Revenue", expr: "TR  =  Price  ×  Quantity" },
        steps: [
          { lbl: "January TR", math: "$1,200 × 500 rings", res: "= $600,000" },
          { lbl: "February TR", math: "$1,000 × 600 rings", res: "= $600,000" },
          { lbl: "Change in TR", math: "$600,000 − $600,000", res: "= $0  (no change)" },
        ],
        answer: "Revenue stayed exactly the same: $600,000 both months",
        interp: "This is the hallmark of unit elastic demand — price cuts don't move revenue. The volume gain precisely offsets the per-unit revenue loss. This is the Total Revenue Test in action."
      }
    ]
  },
  {
    ch: 1, id: "p2", num: "Problem 2", diff: "beginner",

// ── STATE ─────────────────────────────────────────────────────────────────
let state = {
  activeCh: 1,
  activeQ: "p1",
  activePart: 0,
  activeTab: "what",
  stepsRevealed: {},    // key -> count
  partsDone: {},        // key -> bool
};

function key(qId, partIdx) { return qId + "_" + partIdx; }

function totalParts(chId) {
  return QUESTIONS.filter(q => q.ch === chId).reduce((a, q) => a + q.parts.length, 0);
}
function doneParts(chId) {
  let n = 0;
  QUESTIONS.filter(q => q.ch === chId).forEach(q =>
    q.parts.forEach((_, i) => { if (state.partsDone[key(q.id, i)]) n++; })
  );
  return n;
}
function totalAllParts() {
  return QUESTIONS.reduce((a, q) => a + q.parts.length, 0);
}
function doneAllParts() {
  return Object.values(state.partsDone).filter(Boolean).length;
}

// ── RENDERERS ─────────────────────────────────────────────────────────────
function renderSidebar() {
  document.querySelectorAll('.ch-btn').forEach(btn => {
    const ch = parseInt(btn.dataset.ch);
    btn.classList.toggle('active', ch === state.activeCh);
  });

  const chQs = QUESTIONS.filter(q => q.ch === state.activeCh);
  const list = document.getElementById('q-list');
  list.innerHTML = chQs.map(q => {
    const allDone = q.parts.every((_, i) => state.partsDone[key(q.id, i)]);
    return `<li class="q-item ${q.id === state.activeQ ? 'active' : ''} ${allDone ? 'done' : ''}"
      onclick="switchQ('${q.id}')">
      <span class="q-check">${allDone ? '✓' : ''}</span>
      <span>${q.num}: ${q.topic}</span>
    </li>`;
  }).join('');

  const ch = CHAPTERS.find(c => c.id === state.activeCh);
  document.getElementById('ch-summary').textContent = ch.summary;
}

function renderStats() {
  const chId = state.activeCh;
  const done = doneParts(chId);
  const total = totalParts(chId);
  const allDone = doneAllParts();
  const allTotal = totalAllParts();
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${done}/${total}</div>
      <div class="stat-lbl">Chapter parts done</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${pct}%</div>
      <div class="stat-lbl">Chapter complete</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${allDone}/${allTotal}</div>
      <div class="stat-lbl">Total parts done</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${QUESTIONS.filter(q => q.ch === chId).length}</div>
      <div class="stat-lbl">Questions this chapter</div>
    </div>
  `;

  document.getElementById('progress-pill').textContent = `${allDone} / ${allTotal} parts`;
}

  const q = QUESTIONS.find(q => q.id === state.activeQ);
  if (!q) return;

  const part = q.parts[state.activePart];
  const pKey = key(q.id, state.activePart);
  const revealed = state.stepsRevealed[pKey] || 0;
  const isDone = !!state.partsDone[pKey];
  const ctx = q.context[state.activeTab] || '';

  const ctxClass = { what:'ctx-what', why:'ctx-why', who:'ctx-who', when:'ctx-when', how:'ctx-how' };

            const done = state.partsDone[key(q.id, i)];
            return `<button class="part-btn ${i === state.activePart ? 'active' : ''} ${done ? 'done' : ''}"
              onclick="switchPart(${i})">${p.label}${done ? ' ✓' : ''}</button>`;
          }).join('')}
        </div>

        <div class="part-q-text">${part.q}</div>

        <div class="formula-box">
          <div class="formula-lbl">${part.formula.label}</div>
          <div class="formula-expr">${part.formula.expr}</div>
        </div>

        <div class="calc-area">${stepsHTML || ''}</div>

        ${actionHTML}
      </div>
    </div>
  `;
}

function renderCongratsHTML(q) {
  const allDone = q.parts.every((_, i) => state.partsDone[key(q.id, i)]);
  if (!allDone) return '';
  const chQs = QUESTIONS.filter(qq => qq.ch === q.ch);
  const nextQ = chQs[chQs.indexOf(q) + 1];
  return `<div class="congrats-box">
    <div class="congrats-title">Problem complete!</div>
    <div class="congrats-sub">You worked through all ${q.parts.length} parts of <em>${q.title}</em>.</div>
    <div class="btn-row" style="justify-content:center">
      ${nextQ ? `<button class="btn btn-jade" onclick="switchQ('${nextQ.id}')">Next: ${nextQ.num} →</button>` : ''}
    </div>
  </div>`;
}

function renderAll() {
  renderSidebar();
  renderStats();
  renderQuestion();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function switchChapter(id) {
  state.activeCh = id;
  const first = QUESTIONS.find(q => q.ch === id);
  if (first) { state.activeQ = first.id; state.activePart = 0; }
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchQ(id) {
  state.activeQ = id;
  state.activePart = 0;
  renderAll();
  document.getElementById('q-content').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchPart(i) {
  state.activePart = i;
  renderQuestion();
}

function switchTab(t) {
  state.activeTab = t;
  renderQuestion();
}

function revealStep(qId) {
  const k = key(qId, state.activePart);
  state.stepsRevealed[k] = (state.stepsRevealed[k] || 0) + 1;
  renderQuestion();
}

function markDone(qId) {
  const k = key(qId, state.activePart);
  state.partsDone[k] = true;
  if (state.activePart < QUESTIONS.find(q => q.id === qId).parts.length - 1) {
    state.activePart++;
    if (!state.stepsRevealed[key(qId, state.activePart)]) {
      state.stepsRevealed[key(qId, state.activePart)] = 0;
    }
  }
  renderAll();
}

function goNextPart(i) {
  state.activePart = i;
  renderAll();
}

// ── INIT ─────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
