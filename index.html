<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroReady MBA — Diamond Economics Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a; --navy-2: #1a2e42; --navy-3: #243d54;
  --gold: #c9a84c; --gold-light: #f0d485; --gold-dim: #7a6330;
  --cream: #faf6ef; --cream-2: #f0e8d8; --cream-3: #e4d5be;
  --jade: #2d6a4f; --jade-light: #95d5b2;
  --rose: #8b2635; --rose-light: #f4a0a8;
  --slate: #4a5568; --slate-light: #cbd5e0;
  --white: #ffffff; --text: #0d1b2a; --text-muted: #5a6a7a; --text-dim: #8a9aaa;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 2px 12px rgba(13,27,42,0.10); --shadow-lg: 0 8px 32px rgba(13,27,42,0.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px;line-height:1.65;}

/* HEADER */
.site-header{background:var(--navy);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold);}
.header-inner{max-width:1100px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo-main{font-family:'DM Serif Display',serif;color:var(--gold);font-size:22px;letter-spacing:-0.02em;}
.logo-sub{color:var(--slate-light);font-size:12px;font-weight:300;letter-spacing:0.08em;text-transform:uppercase;margin-left:10px;}
.progress-pill{background:var(--navy-2);border:1px solid var(--navy-3);border-radius:20px;padding:4px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);}

/* LAYOUT */
.layout{max-width:1100px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:260px 1fr;gap:2rem;align-items:start;}

/* SIDEBAR */
.sidebar{position:sticky;top:80px;}
.sidebar-section{margin-bottom:1.5rem;}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.5rem;padding-left:2px;}
.ch-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border:none;border-radius:var(--radius);background:transparent;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-muted);transition:all 0.15s;margin-bottom:3px;}
.ch-btn:hover{background:var(--cream-2);color:var(--text);}
.ch-btn.active{background:var(--navy);color:var(--gold);font-weight:500;}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ch-num{font-family:'DM Mono',monospace;font-size:10px;opacity:0.6;}
.q-list{list-style:none;}
.q-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-muted);transition:all 0.15s;margin-bottom:2px;border:1px solid transparent;}
.q-item:hover{background:var(--cream-2);color:var(--text);}
.q-item.active{background:var(--cream-2);border-color:var(--cream-3);color:var(--text);font-weight:500;}
.q-item.done{color:var(--jade);}
.q-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--slate-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.q-item.done .q-check{background:var(--jade);border-color:var(--jade);color:white;}

/* MAIN */
.main{min-width:0;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--cream-3);border-radius:var(--radius);padding:0.75rem 1rem;text-align:center;}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--navy);}
.stat-lbl{font-size:11px;color:var(--text-dim);margin-top:2px;}

/* QUESTION CARD */
.q-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.5rem;border:1px solid var(--cream-3);}
.q-card-header{background:var(--navy);padding:1.5rem 2rem;display:flex;flex-direction:column;gap:8px;}
.q-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.badge-num{background:var(--gold-dim);color:var(--gold-light);}
.badge-diff-b{background:rgba(45,106,79,0.3);color:var(--jade-light);}
.badge-diff-i{background:rgba(139,38,53,0.3);color:var(--rose-light);}
.badge-topic{background:var(--navy-2);color:var(--slate-light);}
.q-card-title{font-family:'DM Serif Display',serif;color:var(--white);font-size:20px;line-height:1.3;}
.q-card-body{padding:1.5rem 2rem;}

/* SCENARIO */
.scenario-box{background:var(--cream);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:14px;line-height:1.7;}
.scenario-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px;}

/* DEEP EXPLAINER */
.deep-explainer{background:var(--navy);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.25rem;}
.deep-explainer-title{font-family:'DM Serif Display',serif;color:var(--gold);font-size:16px;margin-bottom:0.75rem;display:flex;align-items:center;gap:8px;}
.deep-explainer-title span{font-size:13px;font-weight:400;color:var(--slate-light);font-family:'DM Sans',sans-serif;}
.deep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.deep-card{background:var(--navy-2);border-radius:var(--radius);padding:0.9rem 1rem;border:1px solid var(--navy-3);}
.deep-card-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:5px;}
.deep-card-text{font-size:13px;color:var(--slate-light);line-height:1.6;}
.deep-card-text em{color:var(--gold-light);font-style:normal;font-weight:500;}

/* CONTEXT TABS */
.context-section{margin-bottom:1.25rem;}
.context-tabs{display:flex;gap:4px;border-bottom:1px solid var(--cream-3);}
.ctx-tab{padding:7px 16px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-dim);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.ctx-tab:hover{color:var(--text-muted);}
.ctx-tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:500;}
.ctx-content{background:var(--cream);padding:1rem 1.25rem;font-size:14px;line-height:1.7;border:1px solid var(--cream-3);border-top:none;border-radius:0 0 var(--radius) var(--radius);}
.ctx-who{border-left:3px solid var(--gold);}
.ctx-why{border-left:3px solid var(--jade);}
.ctx-what{border-left:3px solid #5b7fa6;}
.ctx-when{border-left:3px solid var(--rose);}
.ctx-how{border-left:3px solid #6b5fa6;}

/* PARTS NAV */
.parts-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.part-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--cream-3);background:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-muted);transition:all 0.15s;}
.part-btn:hover{border-color:var(--slate-light);color:var(--text);}
.part-btn.active{background:var(--navy);border-color:var(--navy);color:var(--gold);font-weight:500;}
.part-btn.done{border-color:var(--jade);color:var(--jade);background:rgba(45,106,79,0.06);}
.part-q-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:1rem;line-height:1.6;}

/* FORMULA BOX with hoverable variables */
.formula-box{background:var(--navy);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:0.75rem;}
.formula-lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px;}
.formula-expr{font-family:'DM Mono',monospace;font-size:15px;color:var(--gold-light);line-height:1.8;white-space:pre-wrap;}
.var-def-section{margin-bottom:1rem;}
.var-def-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;margin-top:0.75rem;}
.var-grid{display:flex;flex-wrap:wrap;gap:6px;}

/* HOVER VARIABLE TOKENS */
.vtoken{display:inline-block;position:relative;cursor:help;}
.vtoken-inner{font-family:'DM Mono',monospace;font-size:14px;color:var(--gold-light);background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.35);border-radius:5px;padding:1px 6px;transition:all 0.15s;}
.vtoken:hover .vtoken-inner{background:rgba(201,168,76,0.30);border-color:var(--gold);}
.vtoken-popup{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--white);border:1px solid var(--cream-3);border-radius:var(--radius);padding:10px 14px;min-width:220px;max-width:300px;box-shadow:var(--shadow-lg);z-index:200;pointer-events:none;opacity:0;transition:opacity 0.15s;}
.vtoken:hover .vtoken-popup{opacity:1;}
.vtoken-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--cream-3);}
.vtoken-popup-symbol{font-family:'DM Mono',monospace;font-size:16px;color:var(--navy);font-weight:500;margin-bottom:4px;}
.vtoken-popup-name{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;}
.vtoken-popup-def{font-size:12px;color:var(--text-muted);line-height:1.5;}
.vtoken-popup-example{font-size:11px;color:var(--jade);margin-top:5px;font-style:italic;}

/* inline var pill in formula text area */
.formula-vars{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.fvar-row{display:flex;align-items:baseline;gap:8px;}
.fvar-sym{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);min-width:48px;}
.fvar-eq{color:var(--gold-dim);font-size:12px;}
.fvar-name{font-size:13px;color:var(--slate-light);font-weight:500;}
.fvar-def{font-size:12px;color:var(--text-dim);margin-left:4px;}

/* CALC STEPS */
.calc-area{background:var(--cream);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;border:1px solid var(--cream-3);}
.calc-step-row{display:grid;grid-template-columns:190px 1fr auto;gap:10px;align-items:start;padding:8px 0;border-bottom:1px solid var(--cream-3);animation:fadeUp 0.25s ease;}
.calc-step-row:last-child{border-bottom:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.step-lbl{font-size:12px;color:var(--text-dim);font-weight:500;padding-top:2px;}
.step-math{font-family:'DM Mono',monospace;font-size:13px;color:var(--slate);}
.step-result{font-family:'DM Mono',monospace;font-size:13px;color:var(--navy);font-weight:500;text-align:right;white-space:nowrap;}

/* ANSWER */
.answer-box{background:linear-gradient(135deg,rgba(45,106,79,0.08),rgba(45,106,79,0.04));border:1.5px solid rgba(45,106,79,0.3);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;animation:fadeUp 0.25s ease;}
.answer-lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--jade);margin-bottom:6px;}
.answer-val{font-family:'DM Mono',monospace;font-size:16px;color:var(--jade);font-weight:500;margin-bottom:8px;line-height:1.4;}
.answer-interp{font-size:13px;color:var(--text-muted);line-height:1.6;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--radius);border:1.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.15s;}
.btn-ghost{background:transparent;border-color:var(--cream-3);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--slate-light);color:var(--text);background:var(--cream);}
.btn-primary{background:var(--navy);border-color:var(--navy);color:var(--gold);}
.btn-primary:hover{background:var(--navy-2);}
.btn-jade{background:var(--jade);border-color:var(--jade);color:white;}
.btn-jade:hover{background:#245c43;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.75rem;}
.reveal-hint{font-size:13px;color:var(--text-dim);font-style:italic;padding:8px 0;}

/* CONGRATS */
.congrats-box{background:var(--navy);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;margin-top:1rem;animation:fadeUp 0.3s ease;}
.congrats-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--gold);margin-bottom:6px;}
.congrats-sub{font-size:13px;color:var(--slate-light);margin-bottom:1rem;line-height:1.6;}

/* KEY INSIGHT BOX */
.insight-box{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;}
.insight-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:5px;}
.insight-text{font-size:13px;color:var(--text);line-height:1.65;}

/* FOOTER */
.site-footer{background:var(--navy);color:var(--slate-light);text-align:center;padding:1.5rem;font-size:12px;margin-top:3rem;border-top:2px solid var(--gold-dim);}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .calc-step-row{grid-template-columns:1fr;}
  .step-result{text-align:left;}
  .deep-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <span class="logo-main">MicroReady MBA</span>
      <span class="logo-sub">Diamond Economics Tutor</span>
    </div>
    <span class="progress-pill" id="progress-pill">0 / 33 parts</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Chapters</div>
      <button class="ch-btn active" data-ch="1" onclick="switchChapter(1)">
        <span class="ch-dot" style="background:#378ADD"></span>
        <span class="ch-num">Ch 1</span>Elasticity
      </button>
      <button class="ch-btn" data-ch="2" onclick="switchChapter(2)">
        <span class="ch-dot" style="background:#2d6a4f"></span>
        <span class="ch-num">Ch 2</span>Externalities
      </button>
      <button class="ch-btn" data-ch="3" onclick="switchChapter(3)">
        <span class="ch-dot" style="background:#c9a84c"></span>
        <span class="ch-num">Ch 3</span>Public Goods
      </button>
      <button class="ch-btn" data-ch="4" onclick="switchChapter(4)">
        <span class="ch-dot" style="background:#8b2635"></span>
        <span class="ch-num">Ch 4</span>Info Asymmetry
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Questions</div>
      <ul class="q-list" id="q-list"></ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Chapter overview</div>
      <div id="ch-summary" style="font-size:12px;color:var(--text-muted);line-height:1.6;padding:4px 2px;"></div>
    </div>
  </aside>

  <main class="main">
    <div class="stats-row" id="stats-row"></div>
    <div id="q-content"></div>
  </main>
</div>

<footer class="site-footer">
  FIN 515 · Prof. Melissa M. Appleyard · Portland State University · MicroReady MBA — Diamond Jewelry & SCS-007 Certification Primer
</footer>

<script>
// ─── VARIABLE DEFINITIONS LIBRARY ───────────────────────────────────────────
const VARS = {
  Ed:   { sym:"E_d",   name:"Own-Price Elasticity",         def:"How much quantity demanded changes when this product's own price changes. Always negative (price up → quantity down).", ex:"E_d = −1.22 means a 1% price rise causes a 1.22% drop in sales." },
  Exy:  { sym:"E_xy",  name:"Cross-Price Elasticity",        def:"How much demand for good X changes when the price of good Y changes. Sign reveals the relationship.", ex:"E_xy = +1.22: natural diamonds cheaper → lab-grown sales drop 1.22%." },
  EI:   { sym:"E_I",   name:"Income Elasticity",             def:"How much quantity demanded changes when consumer income changes. Shows whether a good is a luxury or necessity.", ex:"E_I = 2.0: income rises 10% → diamond purchases rise 20%." },
  pctQ: { sym:"%ΔQ",   name:"Percent Change in Quantity",    def:"The change in quantity sold, expressed as a percentage of the average quantity. Using the average (midpoint method) gives a symmetric result.", ex:"Sales go from 500 to 600: %ΔQ = 100/550 = 18.18%." },
  pctP: { sym:"%ΔP",   name:"Percent Change in Price",       def:"The change in price, expressed as a percentage of the average price. We use the midpoint average so the answer is the same regardless of direction.", ex:"Price drops from $1,200 to $1,000: %ΔP = −200/1,100 = −18.18%." },
  pctI: { sym:"%ΔI",   name:"Percent Change in Income",      def:"The change in average consumer income, expressed as a percentage of the average income across both periods.", ex:"Income rises from $90k to $99k: %ΔI = 9,000/94,500 = 9.52%." },
  Q1Q2: { sym:"Q₁, Q₂",name:"Initial and New Quantity",      def:"Q₁ is the original quantity demanded before the price change. Q₂ is the new quantity demanded after the change. Always identify which is which before calculating.", ex:"January: Q₁ = 500 rings. February: Q₂ = 600 rings." },
  P1P2: { sym:"P₁, P₂",name:"Initial and New Price",         def:"P₁ is the original price. P₂ is the new price. The midpoint method uses their average (P₁+P₂)/2 as the denominator.", ex:"January: P₁ = $1,200. February: P₂ = $1,000." },
  TR:   { sym:"TR",    name:"Total Revenue",                  def:"The total money a firm earns from selling its product. Calculated as Price × Quantity. Elasticity tells you whether a price change grows or shrinks TR.", ex:"TR = $1,000 × 600 = $600,000." },
  Px:   { sym:"P_x",   name:"Price of Good X",               def:"The price of the product whose demand we're measuring (e.g., lab-grown diamonds).", ex:"P_x = $2,500 per lab-grown carat." },
  Qx:   { sym:"Q_x",   name:"Quantity of Good X Demanded",   def:"The quantity of product X that consumers want to buy. This is what changes in response to other goods' price changes.", ex:"Q_x = 80 lab-grown rings per month." },
  Py:   { sym:"P_y",   name:"Price of Good Y",               def:"The price of the other related product (e.g., natural diamonds). A change in P_y is what we're measuring the effect of.", ex:"P_y drops from $6,000 to $5,000 per natural carat." },
  SC:   { sym:"SC",    name:"Social Cost",                    def:"The full cost of production to society — including costs the firm pays AND costs imposed on others (externalities). SC = private cost + external cost.", ex:"Coal energy costs the firm $20/carat privately, but causes $11.25 in climate damage — SC = $31.25." },
  MPC:  { sym:"MPC",   name:"Marginal Private Cost",          def:"The additional cost to the firm of producing one more unit. This is what firms minimize when making production decisions — it does NOT include externalities.", ex:"MPC = 40 + 0.002Q means each extra carat costs $40 plus a rising amount as output grows." },
  MSC:  { sym:"MSC",   name:"Marginal Social Cost",           def:"The true cost to society of producing one more unit: MPC + net external costs. The socially optimal output is where Price = MSC.", ex:"MSC = MPC + $5 net MEC. If MPC = 40 + 0.002Q, then MSC = 45 + 0.002Q." },
  MEC:  { sym:"MEC",   name:"Marginal External Cost",         def:"The additional cost imposed on third parties (non-participants) by producing one more unit. Pollution, CO₂ emissions, and health impacts are common examples.", ex:"Each carat mined causes $15 in environmental damage → MEC = $15." },
  netMEC:{ sym:"Net MEC",name:"Net Marginal External Cost",  def:"Negative externalities minus positive externalities. If a mine causes $15 harm but creates $10 in community benefits, net MEC = $5.", ex:"Net MEC = $15 (environmental) − $10 (jobs/taxes) = $5/carat." },
  t:    { sym:"t*",    name:"Pigouvian Tax",                  def:"The optimal tax per unit of output, set equal to the net marginal external cost at the socially optimal output level. Designed to make firms internalize the damage they cause.", ex:"t* = $5/carat makes the mine produce 37,500 carats instead of 40,000." },
  Q:    { sym:"Q",     name:"Quantity Produced",              def:"The number of units produced and sold per period. In optimization, we solve for the Q that maximizes profit or social welfare.", ex:"Q = 40,000 carats/year is the profit-maximizing output before the Pigouvian tax." },
  P:    { sym:"P",     name:"Market Price",                   def:"The price at which diamonds sell in the market. For optimization, we set P equal to MPC (private) or MSC (social) to find the optimal output.", ex:"P = $120/carat for rough diamonds at Karowe mine." },
  EV:   { sym:"E[V]",  name:"Expected Value",                 def:"A probability-weighted average: what buyers rationally expect a product to be worth when they can't observe quality directly. Equal weights if market shares are known.", ex:"If 40% genuine ($850 value) and 60% greenwashed ($480), E[V] = 0.4×850 + 0.6×480 = $628." },
  p1:   { sym:"p₁,p₂", name:"Probability Weights (market shares)", def:"The fractions of the market occupied by each quality tier. Must sum to 1. In the lemons model, these are what buyers use to form expectations.", ex:"40% genuine, 60% greenwasher: p₁=0.4, p₂=0.6." },
  V1:   { sym:"V₁,V₂", name:"Value of each quality tier",    def:"The true value a fully-informed consumer would place on each quality tier. Buyers don't observe these directly — they only see the average.", ex:"V_genuine = $850/carat. V_greenwasher = $480/carat." },
  N:    { sym:"N",     name:"Number of firms",                def:"The total number of producers in the industry. Affects the free-rider calculation: the more firms, the smaller each one's share of the collective benefit from contributing.", ex:"N = 20 diamond producers, each gaining $180,000 if the standard exists." },
  B:    { sym:"B",     name:"Individual benefit",             def:"The value each firm receives if the public good (sustainability standard) is provided — regardless of whether they contributed to its cost.", ex:"B = $180,000 per firm in consumer trust benefits from SCS-007." },

// Helper: build a hoverable variable token (used in formula rendering)
function vt(symbol, varKey, displayText) {
  const v = VARS[varKey];
  if (!v) return `<span style="font-family:'DM Mono',monospace;color:var(--gold-light)">${displayText||symbol}</span>`;
  return `<span class="vtoken"><span class="vtoken-inner">${displayText||symbol}</span>
    <div class="vtoken-popup">
      <div class="vtoken-popup-symbol">${v.sym}</div>
      <div class="vtoken-popup-name">${v.name}</div>
      <div class="vtoken-popup-def">${v.def}</div>
      <div class="vtoken-popup-example">${v.ex}</div>
    </div></span>`;
}

// Build a variable definitions row shown below the formula
function varDefsHTML(keys) {
  return `<div class="formula-vars">${keys.map(k => {
    const v = VARS[k];
    if (!v) return '';
    return `<div class="fvar-row">
      <span class="fvar-sym">${v.sym}</span>
      <span class="fvar-eq">=</span>
      <span class="fvar-name">${v.name}</span>
      <span class="fvar-def">— ${v.def}</span>
    </div>`;
  }).join('')}</div>`;
}

  { ch:2, id:"p5", num:"Problem 5", diff:"intermediate", topic:"Net Externalities & MSC Functions", title:"Mining with positive and negative externalities",
    scenario:"Karowe Mining (Botswana). Marginal private cost: <strong>MPC = 40 + 0.002Q</strong>. Each carat creates <strong>$15 negative externalities</strong> (environmental) and <strong>$10 positive externalities</strong> (jobs, taxes, infrastructure). Market price = <strong>$120/carat</strong>.",
    context:{
      what:"Real-world externalities are almost never one-sided. Diamond mines cause environmental damage (negative) AND create jobs and tax revenue that fund schools and hospitals (positive). The policy question is the NET effect — and only after netting out do you know whether to tax or subsidize, and by how much.",
      why:"Botswana's government earns ~30% of GDP from diamonds. The positive externalities (jobs, schools, roads) are enormous. But environmental damage is real too. A policy that ignores positive externalities overtaxes mining and destroys livelihoods. A policy that ignores negative externalities allows uncompensated harm. The NET approach balances both.",
      who:"The net externality framework extends Pigou (1920). William Baumol ('On Taxation and the Control of Externalities', 1972) formalized how Pigouvian taxes should be calibrated. Ronald Coase (1960) emphasized that the direction of the tax depends entirely on the net social cost, not gross harm.",
      when:"Any production process creating both costs and benefits for third parties simultaneously: mining, energy, pharmaceutical R&D (positive spillovers from research), agriculture (soil health vs. runoff). The net approach prevents both over-taxation (ignoring positives) and under-taxation (ignoring negatives).",
      how:"Net MEC = negative externalities minus positive externalities. Add net MEC to MPC to get MSC. Set P = MSC to find the socially optimal Q. Compare to private Q (where P = MPC). Difference is the overproduction. Optimal Pigouvian tax = net MEC."
    },
    parts:[
      { label:"Part a", q:"What is the net external cost per carat? Write the marginal social cost (MSC) function.",
        formula:{ label:"Net Externality and MSC",
          html:`Net ${vt('MEC','netMEC')} = Negative ext. − Positive ext. &nbsp;|&nbsp; ${vt('MSC','MSC')} = ${vt('MPC','MPC')} + Net ${vt('MEC','netMEC')}` },
        varKeys:['MEC','netMEC','MSC','MPC'],
        steps:[
          {lbl:"Negative externality",math:"$15 per carat",res:"environmental damage"},
          {lbl:"Positive externality",math:"$10 per carat",res:"jobs, taxes, infrastructure"},
          {lbl:"Net MEC",math:"$15 − $10",res:"= $5 net external cost per carat"},
          {lbl:"MSC function",math:"MSC = (40 + 0.002Q) + $5",res:"= 45 + 0.002Q"},
        ],
        answer:"Net MEC = $5/carat  |  MSC = 45 + 0.002Q",
        interp:"The mine imposes $5 of net harm per carat on society — after crediting the genuine benefits it creates. This $5 is the correct Pigouvian tax target, not $15 (ignoring positives) or $0 (ignoring negatives)."
      },
      { label:"Part b", q:"Find the profit-maximizing output (P = MPC) and the socially optimal output (P = MSC).",
        formula:{ label:"Output optimization rules",
          html:`Private profit max: ${vt('P','P')} = ${vt('MPC','MPC')} → solve for ${vt('Q','Q')} &nbsp;|&nbsp; Social optimum: ${vt('P','P')} = ${vt('MSC','MSC')} → solve for ${vt('Q','Q')}` },
        varKeys:['P','Q','MPC','MSC'],
        steps:[
          {lbl:"Private max: P = MPC",math:"120 = 40 + 0.002Q",res:"→ 0.002Q = 80 → Q* = 40,000 carats/year"},
          {lbl:"Social optimum: P = MSC",math:"120 = 45 + 0.002Q",res:"→ 0.002Q = 75 → Q** = 37,500 carats/year"},
        ],
        answer:"Private output: Q* = 40,000 carats/year  |  Social optimum: Q** = 37,500 carats/year",
        interp:"The mine produces 2,500 carats more per year than is socially optimal, because it ignores the $5/carat net damage its production causes. Every one of those extra 2,500 carats creates net social harm."
      },
      { label:"Part c", q:"Is the mine overproducing or underproducing relative to the social optimum? By how many carats?",
        formula:{ label:"Output gap",
          html:`Overproduction = ${vt('Q','Q')}* (private) − ${vt('Q','Q')}** (social)` },
        varKeys:['Q','MPC','MSC'],
        steps:[
          {lbl:"Private output Q*",math:"40,000 carats",res:""},
          {lbl:"Social optimum Q**",math:"37,500 carats",res:""},
          {lbl:"Excess output",math:"40,000 − 37,500",res:"= 2,500 carats of overproduction"},
          {lbl:"Total harm from overproduction",math:"2,500 × $5 net MEC",res:"= $12,500/year in unaddressed net harm"},
        ],
        answer:"Overproducing by 2,500 carats per year — creating $12,500/year in uncompensated net social harm.",
        interp:"This is the standard negative externality result: firms ignoring external costs always produce too much. Each of the extra 2,500 carats costs society $5 more to produce (in net harm) than it's worth to produce at the margin."
      },
      { label:"Part d", q:"What Pigouvian tax per carat would move the mine to the socially optimal output?",
        formula:{ label:"Pigouvian tax rule",
          html:`${vt('t','t')}* = Net ${vt('MEC','netMEC')} at the socially optimal output level` },
        varKeys:['t','netMEC','MPC','MSC'],
        steps:[

          {lbl:"Pigouvian tax",math:"t* = $5 per carat",res:""},
          {lbl:"Verify: P − tax = MPC at Q**",math:"$120 − $5 = $115; 115 = 40 + 0.002Q → Q = 37,500",res:"✓ confirms Q** = 37,500"},

        answer:"Pigouvian tax = $5 per carat.",
        interp:"With a $5/carat tax, the mine's effective price becomes $115. Setting MPC = $115 gives exactly Q** = 37,500 — the social optimum. The firm adjusts its own production without the regulator needing to dictate an output level."

          {lbl:"Correct policy response",math:"Tax = $5 (not $15, not $0)",res:"→ acknowledges both sides of the ledger"},
        ],
        answer:"Botswana's argument is partially correct but ultimately wrong. Positive externalities reduce the optimal tax from $15 to $5 — but don't eliminate the case for intervention.",
        interp:"This is the nuanced, real-world answer that a good economist gives: 'You're right that positives matter and should reduce the tax. But the net externality is still positive ($5), so some Pigouvian intervention is still warranted.' The correct policy honors both sides."
      }
    ]

  { ch:3, id:"p6", num:"Problem 6", diff:"beginner", topic:"Public Goods & Free-Riding", title:"Who pays for the SCS-007 standard?",
    scenario:"Creating SCS-007 cost <strong>$2 million</strong>. There are <strong>20 diamond producers</strong>. Each gains <strong>$180,000</strong> in consumer trust benefits if the standard exists — whether or not they helped fund it.",
    context:{
      what:"A public good has two properties: (1) non-rivalrous — one person using it doesn't reduce what's available for others, and (2) non-excludable — you can't stop people from benefiting even if they didn't pay. The SCS-007 criteria document is non-rivalrous (any firm can read it) but the certification mark is excludable (only paying, compliant firms can use it). That distinction is crucial.",
      why:"If any producer can benefit from the standard's consumer trust effect without paying for its development, every producer wants to free-ride. When everyone reasons this way, nobody funds it — and the standard never gets made. This happens even when total benefits ($3.6M) far exceed total costs ($2M). That's the market failure.",
      who:"Paul Samuelson defined public goods formally in 1954. Mancur Olson's <em>The Logic of Collective Action</em> (1965) showed why large groups systematically under-provide public goods. Elinor Ostrom won the 2009 Nobel Prize showing how communities can overcome this with smart institutional design.",
      when:"Any time an industry tries to coordinate on shared infrastructure: a common standard, collective marketing, shared research, or lobbying. The free-rider problem appears wherever individual incentives conflict with collective rationality. It's one of the most common reasons government or industry associations step in.",
      how:"Compare total benefit to total cost (should the good be provided?). Then analyze each firm's individual incentive: is free-riding more profitable than contributing? Show the Nash equilibrium. Then explain how SCS Global Services' club good structure flips the incentive."
    },
    parts:[
      { label:"Part a", q:"What is the total industry benefit? Does it exceed total cost?",
        formula:{ label:"Total Benefit Test",
          html:`Total Benefit = ${vt('N','N')} firms × ${vt('B','B')} per firm` },
        varKeys:['N','B','C'],
        steps:[
          {lbl:"Total industry benefit",math:"20 firms × $180,000",res:"= $3,600,000"},
          {lbl:"Total cost",math:"development cost",res:"= $2,000,000"},
          {lbl:"Net social value",math:"$3,600,000 − $2,000,000",res:"= +$1,600,000 — YES, benefits exceed costs"},
        ],
        answer:"Total benefit = $3.6M. Total cost = $2M. Net value = +$1.6M. The standard is clearly worth making.",
        interp:"So why doesn't it automatically get made? That's the free-rider puzzle — the math says yes, but the incentives say something entirely different."
      },
      { label:"Part b", q:"If each firm is asked to voluntarily contribute $100,000 (equal share), would any individual firm do so?",
        formula:{ label:"Free-rider incentive calculation",
          html:`Compare: payoff from contributing ${vt('C','C')} vs. payoff from free-riding (paying $0)` },
        varKeys:['N','B','C'],
        steps:[
          {lbl:"If I contribute $100k",math:"I gain $180k in benefits, I pay $100k",res:"→ net = +$80k for me"},
          {lbl:"If I free-ride (others contribute)",math:"I gain $180k, I pay $0",res:"→ net = +$180k for me"},
          {lbl:"Comparison",math:"+$180k > +$80k",res:"→ free-riding is ALWAYS better for any individual"},
          {lbl:"Every firm thinks this",math:"dominant strategy = free-ride",res:"→ Nash: zero voluntary contributions"},
        ],
        answer:"No individual firm has incentive to contribute — free-riding always pays $100k more than contributing.",
        interp:"Even though contributing gives a positive net return (+$80k), NOT contributing gives a better return (+$180k). When individual rationality conflicts with collective rationality, individual rationality wins — unless the institution changes the payoffs."
      },
      { label:"Part c", q:"Explain the free-rider problem. Why might the standard be underprovided?",
        formula:{ label:"Nash Equilibrium of the public goods game",
          html:`Nash equilibrium: all firms free-ride → zero contributions → standard not funded → $1.6M net value destroyed` },
        varKeys:['N','B','C'],
        steps:[
          {lbl:"Each firm's dominant strategy",math:"don't contribute — regardless of what others do",res:"→ this is always the best individual response"},
          {lbl:"When all firms follow",math:"zero contributions → standard not funded",res:"→ $1.6M net value goes unrealized"},
          {lbl:"The gap",math:"Nash outcome (all free-ride) vs cooperative optimum (all contribute)",res:"= value destroyed by coordination failure"},
        ],
        answer:"The standard may never be created because every firm free-rides. Individual rationality produces collective irrationality.",
        interp:"This is the core tragedy of the commons / public goods problem. The market fails not because the good isn't valuable — it's extremely valuable — but because no private actor can capture enough of the benefit to justify paying the full cost."
      },
      { label:"Part d", q:"How does SCS Global Services' certification fee structure fix the free-rider problem?",
        formula:{ label:"Club good transformation",
          html:`Public good + excludability = Club good → free-riders excluded from the certification mark and its competitive benefits` },
        varKeys:['N','B','C'],
        steps:[
          {lbl:"Standard criteria",math:"publicly available online",res:"→ still non-excludable (public good)"},
          {lbl:"Certification mark",math:"'SCS-007 Sustainability Rated' label",res:"→ EXCLUDABLE: only certified firms can use it"},
          {lbl:"What certified firms get",math:"price premiums, retailer contracts, consumer trust, media coverage",res:"→ competitive advantages free-riders can't access"},
          {lbl:"Incentive flip",math:"now there's a PRIVATE reason to pay certification fees",res:"→ free-rider problem solved"},
        ],
        answer:"Certification converts the standard from a pure public good into a club good — only dues-paying, audit-passing members get the competitive advantages.",
        interp:"This is elegant institutional design: SCS Global Services solved the free-rider problem by creating partial excludability. The certification mark is the 'club.' Free-riders can read the criteria, but they can't claim the mark — and without the mark, they can't charge the premium."
      }

  { ch:3, id:"p7", num:"Problem 7", diff:"intermediate", topic:"Coordination Games & Thresholds", title:"Certification as a threshold contribution game",

      why:"This models the real lab-grown diamond market. If only 1–2 companies certify, buyers don't notice or trust it. If 4+ certify, a credible 'certified sustainable lab-grown' category emerges — with real pricing power. Every company's decision depends on what they think others will do.",
      who:"Thomas Schelling's <em>The Strategy of Conflict</em> (1960) analyzed focal points and tipping points in coordination games. Elinor Ostrom's work addressed threshold collective action problems. Baye & Prince Chapter 10 covers game theory and coordination, and the concept of Nash equilibrium (John Nash, 1950) anchors the analysis.",

// ── Popup HTML helper (used in formula HTML strings) ──────────────────────
function popupHTML(varKey) {
  const v = VARS[varKey];
  if (!v) return '';
  return `<div class="vtoken-popup">
    <div class="vtoken-popup-symbol">${v.sym}</div>
    <div class="vtoken-popup-name">${v.name}</div>
    <div class="vtoken-popup-def">${v.def}</div>
    <div class="vtoken-popup-example">${v.ex}</div>
  </div>`;
}

// ── STATE ─────────────────────────────────────────────────────────────────
const state = {
  activeCh: 1, activeQ: "p1", activePart: 0, activeTab: "what",
  stepsRevealed: {}, partsDone: {},
};
function key(qId, pi) { return qId + "_" + pi; }
function totalParts(chId) { return QUESTIONS.filter(q=>q.ch===chId).reduce((a,q)=>a+q.parts.length,0); }
function doneParts(chId) { let n=0; QUESTIONS.filter(q=>q.ch===chId).forEach(q=>q.parts.forEach((_,i)=>{if(state.partsDone[key(q.id,i)])n++;})); return n; }
function totalAll() { return QUESTIONS.reduce((a,q)=>a+q.parts.length,0); }
function doneAll() { return Object.values(state.partsDone).filter(Boolean).length; }

// ── RENDER ────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.ch)===state.activeCh));
  const chQs = QUESTIONS.filter(q=>q.ch===state.activeCh);
  document.getElementById('q-list').innerHTML = chQs.map(q=>{
    const done = q.parts.every((_,i)=>state.partsDone[key(q.id,i)]);
    return `<li class="q-item ${q.id===state.activeQ?'active':''} ${done?'done':''}" onclick="switchQ('${q.id}')">
      <span class="q-check">${done?'✓':''}</span><span>${q.num}: ${q.topic}</span></li>`;
  }).join('');
  document.getElementById('ch-summary').textContent = CHAPTERS.find(c=>c.id===state.activeCh).summary;
}

function renderStats() {
  const chId=state.activeCh, done=doneParts(chId), total=totalParts(chId);
  document.getElementById('stats-row').innerHTML = [
    {v:`${done}/${total}`,l:"Chapter parts done"},
    {v:`${total>0?Math.round(done/total*100):0}%`,l:"Chapter complete"},
    {v:`${doneAll()}/${totalAll()}`,l:"Total parts done"},
    {v:`${QUESTIONS.filter(q=>q.ch===chId).length}`,l:"Questions this chapter"},
  ].map(s=>`<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');
  document.getElementById('progress-pill').textContent = `${doneAll()} / ${totalAll()} parts`;
}

function buildFormulaHTML(formula) {
  if (formula.html) {
    return `<div class="formula-box">
      <div class="formula-lbl">${formula.label}</div>
      <div class="formula-expr">${formula.html}</div>
    </div>`;
  }
  return `<div class="formula-box">
    <div class="formula-lbl">${formula.label}</div>
    <div class="formula-expr">${formula.expr||''}</div>
  </div>`;
}

function buildVarDefs(varKeys) {
  if (!varKeys || varKeys.length === 0) return '';
  const rows = varKeys.map(k=>{
    const v = VARS[k]; if(!v) return '';
    return `<div style="display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--cream-3);">
      <span style="font-family:'DM Mono',monospace;font-size:13px;color:#1F4E79;min-width:60px;font-weight:500">${v.sym}</span>
      <span style="font-size:13px;color:var(--text);font-weight:500;min-width:160px">${v.name}</span>
      <span style="font-size:12px;color:var(--text-muted);line-height:1.5">${v.def}</span>
    </div>`;
  }).join('');
  return `<div style="margin-bottom:1rem">
    <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px">Variable definitions — hover variables in formula for instant lookup</div>
    <div style="background:var(--cream);border:1px solid var(--cream-3);border-radius:var(--radius);padding:4px 12px">${rows}</div>
  </div>`;
}

function buildDeepExplainer(qId) {
  const d = DEEP[qId]; if (!d) return '';
  return `<div class="deep-explainer">
    <div class="deep-explainer-title">${d.title} <span>— ${d.subtitle}</span></div>
    <div class="deep-grid">
      ${d.cards.map(c=>`<div class="deep-card">
        <div class="deep-card-label">${c.label}</div>
        <div class="deep-card-text">${c.text}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderQuestion() {
  const q = QUESTIONS.find(q=>q.id===state.activeQ); if(!q) return;
  const part = q.parts[state.activePart];
  const pKey = key(q.id, state.activePart);
  const revealed = state.stepsRevealed[pKey]||0;
  const isDone = !!state.partsDone[pKey];
  const ctx = q.context[state.activeTab]||'';
  const ctxClass = {what:'ctx-what',why:'ctx-why',who:'ctx-who',when:'ctx-when',how:'ctx-how'};

  let stepsHTML = '';
  for (let i=0;i<revealed;i++) {
    const s=part.steps[i];
    stepsHTML+=`<div class="calc-step-row">
      <div class="step-lbl">${s.lbl}</div>
      <div class="step-math">${s.math}</div>
      <div class="step-result">${s.res}</div>
    </div>`;
  }

  let actionHTML = '';
  if (revealed===0) {
    actionHTML = `<p class="reveal-hint">Click "Show step 1" to walk through the math one step at a time. The formula and variable definitions stay visible above.</p>
      <div class="btn-row"><button class="btn btn-ghost" onclick="revealStep('${q.id}')">Show step 1 of ${part.steps.length}</button></div>`;
  } else if (revealed < part.steps.length) {
    actionHTML = `<div class="btn-row"><button class="btn btn-ghost" onclick="revealStep('${q.id}')">Show step ${revealed+1} of ${part.steps.length}</button></div>`;
  } else if (!isDone) {
    actionHTML = `<div class="answer-box">
      <div class="answer-lbl">Answer</div>
      <div class="answer-val">${part.answer}</div>
      <div class="answer-interp">${part.interp}</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-jade" onclick="markDone('${q.id}')">Got it — mark done</button>
      ${state.activePart<q.parts.length-1?`<button class="btn btn-primary" onclick="markDone('${q.id}')">Got it — next part →</button>`:''}
    </div>`;
  } else {
    actionHTML = `<div class="answer-box">
      <div class="answer-lbl">Answer</div>
      <div class="answer-val">${part.answer}</div>
      <div class="answer-interp">${part.interp}</div>
    </div>
    <div class="btn-row">
      ${state.activePart<q.parts.length-1
        ?`<button class="btn btn-primary" onclick="goNextPart(${state.activePart+1})">Next part →</button>`
        :renderCongrats(q)}
    </div>`;
  }

  document.getElementById('q-content').innerHTML = `
    <div class="q-card">
      <div class="q-card-header">
        <div class="q-card-meta">
          <span class="badge badge-num">${q.num}</span>
          <span class="badge ${q.diff==='beginner'?'badge-diff-b':'badge-diff-i'}">${q.diff}</span>
          <span class="badge badge-topic">${q.topic}</span>
        </div>
        <div class="q-card-title">${q.title}</div>
      </div>
      <div class="q-card-body">
        <div class="scenario-box"><div class="scenario-label">Scenario</div>${q.scenario}</div>
        ${buildDeepExplainer(q.id)}
        <div class="context-section">
          <div class="context-tabs">
            ${['what','why','who','when','how'].map(t=>`
              <button class="ctx-tab ${state.activeTab===t?'active':''}" onclick="switchTab('${t}')">${t==='how'?'How to solve':t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
          </div>
          <div class="ctx-content ${ctxClass[state.activeTab]}">${ctx}</div>
        </div>
        <div class="parts-nav">
          ${q.parts.map((p,i)=>{
            const done=state.partsDone[key(q.id,i)];
            return `<button class="part-btn ${i===state.activePart?'active':''} ${done?'done':''}" onclick="switchPart(${i})">${p.label}${done?' ✓':''}</button>`;
          }).join('')}
        </div>
        <div class="part-q-text">${part.q}</div>
        ${buildFormulaHTML(part.formula)}
        ${buildVarDefs(part.varKeys)}
        <div class="calc-area" id="steps-area">${stepsHTML}</div>
        ${actionHTML}
      </div>
    </div>`;
}

function renderCongrats(q) {
  const allDone = q.parts.every((_,i)=>state.partsDone[key(q.id,i)]);
  if (!allDone) return '';
  const chQs = QUESTIONS.filter(qq=>qq.ch===q.ch);
  const nextQ = chQs[chQs.indexOf(q)+1];
  return `<div class="congrats-box" style="width:100%;margin-top:0">
    <div class="congrats-title">Problem complete!</div>
    <div class="congrats-sub">You worked through all ${q.parts.length} parts of <em>${q.title}</em>.</div>
    ${nextQ?`<button class="btn btn-jade" onclick="switchQ('${nextQ.id}')">Next: ${nextQ.num} →</button>`:''}
  </div>`;
}

function save() { localStorage.setItem('mr_state', JSON.stringify({stepsRevealed: state.stepsRevealed, partsDone: state.partsDone})); }
function load() { try { const s = JSON.parse(localStorage.getItem('mr_state')); if(s) { state.stepsRevealed = s.stepsRevealed; state.partsDone = s.partsDone; } } catch(e) {} }
function renderAll() { save(); renderSidebar(); renderStats(); renderQuestion(); }

// ── ACTIONS ───────────────────────────────────────────────────────────────
function switchChapter(id) {
  state.activeCh=id;
  const first=QUESTIONS.find(q=>q.ch===id);
  if(first){state.activeQ=first.id;state.activePart=0;}
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
function switchQ(id) {
  state.activeQ=id;state.activePart=0;
  renderAll();
  document.getElementById('q-content').scrollIntoView({behavior:'smooth',block:'start'});
}
function switchPart(i) { state.activePart=i; renderQuestion(); }
function switchTab(t) { state.activeTab=t; renderQuestion(); }
function revealStep(qId) {
  const k=key(qId,state.activePart);
  state.stepsRevealed[k]=(state.stepsRevealed[k]||0)+1;
  renderQuestion();
}
function markDone(qId) {
  const k=key(qId,state.activePart);
  state.partsDone[k]=true;
  const q=QUESTIONS.find(q=>q.id===qId);
  if(state.activePart<q.parts.length-1){
    state.activePart++;
    if(!state.stepsRevealed[key(qId,state.activePart)])state.stepsRevealed[key(qId,state.activePart)]=0;
  }
  renderAll();
}
function goNextPart(i) { state.activePart=i; renderAll(); }

load(); renderAll();
</script>
